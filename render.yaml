services:
  - type: web
    name: recipe-extractor-meal-planner
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: recipe-extractor-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash

databases:
  - name: recipe-extractor-db
    plan: free
